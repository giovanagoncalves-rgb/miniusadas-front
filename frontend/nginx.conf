server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash (Vite gera hashes no nome)
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
